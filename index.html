<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>写真ぼかしスタジオ</title>

<meta name="description" content="写真ぼかしスタジオ - 写真を縮小して中央に配置し、余白をぼかして加工するアプリ">
<meta name="theme-color" content="#3B6FE0">

<!-- Google AdSense アカウント連携タグ -->
<meta name="google-adsense-account" content="ca-pub-6620740970029865">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ぼかしスタジオ">

<link rel="stylesheet" href="style.css?v=1.4.2">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6620740970029865" crossorigin="anonymous"></script>
</head>
<body>

<div class="app">

  <header class="header">
    <span class="header-title">写真ぼかしスタジオ</span>
    <span class="header-version" id="appVersion"></span>
  </header>

  <section class="render-mode-bar">
    <div class="mode-toggle" role="group" aria-label="ぼかしモード">
      <button type="button" id="renderModeOrigBtn" class="mode-btn active" data-render-mode="original">画像ぼかしモード</button>
      <button type="button" id="renderModeBgBtn" class="mode-btn" data-render-mode="background">背景ぼかしモード</button>
    </div>
  </section>

  <section class="aspect-bar">
    <label class="options-label" for="aspectSelect">アスペクト比</label>
    <select id="aspectSelect" class="aspect-select">
      <option value="1:1">1:1（正方形）</option>
      <option value="4:3">4:3</option>
      <option value="3:2">3:2</option>
      <option value="16:9">16:9</option>
      <option value="9:16">9:16（縦長）</option>
    </select>
  </section>

  <main class="preview-wrap">
    <div class="preview-frame" id="previewFrame">
      <canvas id="canvas" class="preview-canvas" aria-label="加工後の画像プレビュー"></canvas>

      <div class="placeholder" id="placeholder">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" aria-hidden="true">
          <rect x="4" y="12" width="48" height="36" rx="6" stroke="currentColor" stroke-width="2.2"/>
          <circle cx="28" cy="30" r="9" stroke="currentColor" stroke-width="2.2"/>
          <rect x="20" y="6" width="16" height="8" rx="2" stroke="currentColor" stroke-width="2.2"/>
        </svg>
        <span>画像が選択されていません</span>
      </div>

      <div class="toast" id="toast" hidden></div>
    </div>
  </main>

  <!-- AdSense バナー広告（レスポンシブ、ぼかしアプリ用） -->
  <section class="ad-slot">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6620740970029865"
         data-ad-slot="8588389263"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </section>

  <section class="tool-bar">
    <div class="mode-toggle" role="group" aria-label="操作モード">
      <button type="button" id="modeMoveBtn" class="mode-btn active" data-mode="move">移動・拡大縮小</button>
      <button type="button" id="modeBrushBtn" class="mode-btn" data-mode="brush">ぼかしペン</button>
    </div>
    <div class="brush-options" id="brushOptions" hidden>
      <div class="mode-toggle brush-type-toggle" role="group" aria-label="ブラシ種類">
        <button type="button" id="brushTypeBlurBtn" class="mode-btn active" data-brush-type="blur">ぼかしブラシ</button>
        <button type="button" id="brushTypeEraseBtn" class="mode-btn" data-brush-type="erase">消しゴムブラシ</button>
      </div>
      <div class="options-row">
        <span class="options-label">ブラシサイズ</span>
        <span class="options-value" id="brushSizeValue">20px</span>
      </div>
      <input type="range" id="brushSizeRange" class="blur-range" min="5" max="60" step="1" value="20">
    </div>
  </section>

  <section class="options">
    <div class="options-row">
      <span class="options-label">ぼかし強度</span>
      <span class="options-value" id="blurValue">20px</span>
    </div>
    <input type="range" id="blurRange" class="blur-range" min="0" max="40" step="1" value="20">
  </section>

  <footer class="button-area">
    <button type="button" id="selectBtn" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="3" y="7" width="18" height="13" rx="2.5" stroke="#fff" stroke-width="2"/>
        <circle cx="12" cy="13.5" r="3.4" stroke="#fff" stroke-width="2"/>
        <rect x="8.5" y="4" width="7" height="3.5" rx="1" stroke="#fff" stroke-width="2"/>
      </svg>
      写真を選ぶ
    </button>
    <div class="btn-row">
      <button type="button" id="saveBtn" class="btn btn-secondary" disabled>保存する</button>
      <button type="button" id="shareBtn" class="btn btn-secondary" disabled>共有する</button>
    </div>
  </footer>

  <input type="file" id="fileInput" accept="image/*" hidden>

  <!-- SNSシェアモーダル（保存後に下からスライド表示） -->
  <div class="share-modal-overlay" id="shareModalOverlay" hidden>
    <div class="share-modal" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
      <div class="share-modal-handle"></div>
      <h2 class="share-modal-title" id="shareModalTitle">写真を保存しました</h2>
      <p class="share-modal-desc">SNSで共有してみませんか？</p>
      <div class="share-modal-buttons">
        <button type="button" class="share-btn share-btn-x" data-platform="x">
          <span class="share-btn-icon">X</span>Xでシェア
        </button>
        <button type="button" class="share-btn share-btn-line" data-platform="line">
          <span class="share-btn-icon">L</span>LINEで送る
        </button>
        <button type="button" class="share-btn share-btn-facebook" data-platform="facebook">
          <span class="share-btn-icon">f</span>Facebookでシェア
        </button>
        <button type="button" class="share-btn share-btn-instagram" data-platform="instagram">
          <span class="share-btn-icon">IG</span>Instagramストーリー用リンクコピー
        </button>
      </div>
      <button type="button" class="share-modal-close" id="shareModalCloseBtn">閉じる</button>
    </div>
  </div>

</div>

<script src="main.js?v=1.4.2"></script>
</body>
</html>
